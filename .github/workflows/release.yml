name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          dotnet publish src/QuickLaunch.csproj `
            -c Release `
            --nologo `
            -r win-x64 `
            --self-contained true `
            -p:Version=$version `
            -o publish/QuickLaunch

      - name: Zip
        run: Compress-Archive -Path publish/QuickLaunch/* -DestinationPath QuickLaunch-${{ github.ref_name }}.zip

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: QuickLaunch-*.zip
          generate_release_notes: true
